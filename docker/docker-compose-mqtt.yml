version: '3.8'

services:
  emqx1:
    image: emqx:5.5.1
    container_name: emqx1
    hostname: emqx1
    environment:
      - EMQX_NODE__NAME=emqx@node1.emqx.io
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.io, emqx@node2.emqx.io, emqx@node3.emqx.io]
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=secret123
      - EMQX_ALLOW_ANONYMOUS=false
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5
    volumes:
      - emqx1_data:/opt/emqx/data
    ports:
      - "1883:1883"
      - "18083:18083"
    networks:
      mqtt-net:
        aliases:
          - node1.emqx.io

  emqx2:
    image: emqx:5.5.1
    container_name: emqx2
    hostname: emqx2
    environment:
      - EMQX_NODE__NAME=emqx@node2.emqx.io
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.io, emqx@node2.emqx.io, emqx@node3.emqx.io]
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=secret123
      - EMQX_ALLOW_ANONYMOUS=false
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5
    volumes:
      - emqx2_data:/opt/emqx/data
    ports:
      - "1884:1883"
      - "18084:18083"
    networks:
      mqtt-net:
        aliases:
          - node2.emqx.io

  emqx3:
    image: emqx:5.5.1
    container_name: emqx3
    hostname: emqx3
    environment:
      - EMQX_NODE__NAME=emqx@node3.emqx.io
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=static
      - EMQX_CLUSTER__STATIC__SEEDS=[emqx@node1.emqx.io, emqx@node2.emqx.io, emqx@node3.emqx.io]
      - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=secret123
      - EMQX_ALLOW_ANONYMOUS=false
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5
    volumes:
      - emqx3_data:/opt/emqx/data
    ports:
      - "1885:1883"
      - "18085:18083"
    networks:
      mqtt-net:
        aliases:
          - node3.emqx.io

  mqtt-client:
    image: eclipse-mosquitto
    container_name: mqtt-client
    entrypoint: >
      sh -c "
      echo '🔧 Instalando herramientas...' &&
      apk add --no-cache mosquitto-clients &&
      echo '⏳ Esperando a EMQX...' &&
      sleep 5 &&
      mosquitto_sub -h emqx1 -p 1883 -t edificio1/sala1/temperatura &
      while true; do
        temp=10;
        echo '📤 Publicando temperatura: ' \$temp;
        mosquitto_pub -h emqx1 -p 1883 -t edificio1/sala1/temperatura -m \$temp;
        sleep 5;
      done"
    depends_on:
      emqx1:
        condition: service_healthy
      emqx2:
        condition: service_healthy
      emqx3:
        condition: service_healthy
    networks:
      - mqtt-net

volumes:
  emqx1_data:
  emqx2_data:
  emqx3_data:

networks:
  mqtt-net:
    driver: bridge
